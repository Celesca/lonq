services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: long
      POSTGRES_USER: long
      POSTGRES_PASSWORD: long_password
    ports:
      - "5432:5432"
    volumes:
      - long_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U long -d long"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://long:long_password@postgres:5432/long
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  long_postgres_data:
